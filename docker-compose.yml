version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: erp-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: erp_database
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d erp_database"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: erp-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@erprag.com
      PGADMIN_DEFAULT_PASSWORD: adminpassword
      PGADMIN_CONFIG_X_FRAME_OPTIONS: "'ALLOWALL'"
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "False"
    ports:
      - "127.0.0.1:5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

  mongodb:
    image: mongo:6
    container_name: erp-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express
    container_name: erp-mongo-express
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: adminpassword
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: adminpassword
    ports:
      - "127.0.0.1:8081:8081"
    depends_on:
      - mongodb
    restart: unless-stopped

  neo4j:
    image: neo4j:5.26.0
    container_name: erp-neo4j
    environment:
      NEO4J_AUTH: neo4j/adminpassword
    ports:
      - "127.0.0.1:7474:7474" # HTTP
      - "127.0.0.1:7687:7687" # Bolt
    volumes:
      - neo4j_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  app:
    build: .
    container_name: erp-rag-app
    networks:
      - default
      - lifeplan-net
    ports:
      - "8000:8000"
    environment:
      POSTGRES_URI: postgresql://admin:adminpassword@postgres:5432/erp_database
      MONGO_URI: mongodb://admin:adminpassword@mongodb:27017/
      CHROMA_PATH: /app/chroma_data
      NEO4J_URI: bolt://neo4j:7687
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - chroma_data:/app/chroma_data

  openclaw:
    build:
      context: .
      dockerfile: Dockerfile.claw
    container_name: erp-openclaw
    networks:
      - default
      - lifeplan-net
    ports:
      - "8001:8001"
    environment:
      POSTGRES_URI: postgresql://admin:adminpassword@postgres:5432/erp_database
      MONGO_URI: mongodb://admin:adminpassword@mongodb:27017/
      CHROMA_PATH: /app/chroma_data
      NEO4J_URI: bolt://neo4j:7687
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - chroma_data:/app/chroma_data

volumes:
  postgres_data:
  mongodb_data:
  neo4j_data:
  chroma_data:

networks:
  # Default project network (erp-rag_default) keeps the DB/app tier together.
  default:
  # Shared with the infra Caddy container (infra-frontend-1) so it can reverse
  # proxy erp-rag-app:8000 / erp-openclaw:8001 for the sslip.io HTTPS hostnames.
  lifeplan-net:
    external: true
